services:
  postgres:
    image: postgres:18
    container_name: alerta-dengue-udi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alerta_dengue_udi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alerta_dengue_udi"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: